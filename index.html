<script type="text/babel">
/* ── Tone.js lazy loader ── */
let _toneReady=false;
async function ensureTone(){
  if(_toneReady)return true;
  if(typeof Tone!=='undefined'){_toneReady=true;return true;}
  return new Promise(resolve=>{
    const s=document.createElement('script');
    s.src='https://unpkg.com/tone@14.8.49/build/Tone.js';
    s.onload=()=>{_toneReady=true;resolve(true);};
    s.onerror=()=>resolve(false);
    document.head.appendChild(s);
  });
}

const ScrollMusicEngine=(()=>{
  let pad,bass,melody,hat,pl,bl,ml,hl;
  const S={
    hero:    {bpm:72, chords:[["C3","G3","A3"],["D3","A3","C4"],["A2","E3","G3"],["F3","C4","A3"]]},
    impact:  {bpm:82, chords:[["C3","E3","G3"],["A2","C3","E3"],["F3","A3","C4"],["G3","B3","D4"]]},
    feature: {bpm:96, chords:[["C4","E4","G4"],["D4","F4","A4"],["A3","C4","E4"],["G3","B3","D4"]]},
    writing: {bpm:68, chords:[["E3","G3","B3"],["C3","E3","G3"],["D3","F3","A3"],["G3","B3","D4"]]},
    work:    {bpm:88, chords:[["C3","E3","G3"],["A2","C3","E3"],["F3","A3","C4"],["G3","B3","D4"]]},
    training:{bpm:74, chords:[["C3","F3","A3"],["D3","G3","A3"],["F3","A3","C4"],["G3","B3","D4"]]},
    music:   {bpm:120,chords:[["C4","E4","G4"],["G3","B3","D4"],["A3","C4","E4"],["F3","A3","C4"]]},
    about:   {bpm:60, chords:[["C4","G4","A4"],["E4","B4","G4"],["D4","A4","F4"],["A3","E4","C4"]]}
  };
  function mk(){
    pad=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"sine"},envelope:{attack:2,release:4}}).toDestination();
    bass=new Tone.MonoSynth({oscillator:{type:"triangle"},envelope:{attack:.1,release:.8}}).toDestination();
    melody=new Tone.Synth({oscillator:{type:"triangle"},envelope:{attack:.05,release:.5}}).toDestination();
    hat=new Tone.NoiseSynth({noise:{type:"white"},envelope:{attack:.001,decay:.1,sustain:0}}).toDestination();
    pad.volume.value=-20;bass.volume.value=-16;melody.volume.value=-18;hat.volume.value=-32;
  }
  function stop(){pl?.dispose();bl?.dispose();ml?.dispose();hl?.dispose();}
  function play(id){
    const d=S[id];if(!d)return;
    Tone.Transport.bpm.value=d.bpm;stop();
    let step=0;
    pl=new Tone.Loop(t=>{pad.triggerAttackRelease(d.chords[step%d.chords.length],"2n",t);step++;},"2n").start(0);
    bl=new Tone.Loop(t=>{bass.triggerAttackRelease(d.chords[step%d.chords.length][0],"8n",t);},"4n").start(0);
    ml=new Tone.Loop(t=>{const c=d.chords[step%d.chords.length];melody.triggerAttackRelease(c[Math.floor(Math.random()*c.length)],"16n",t);},"8n").start(0);
    hl=new Tone.Loop(t=>{hat.triggerAttackRelease("16n",t);},"8n").start(0);
  }
  return{init(){mk();Tone.Transport.start();},play};
})();

const {useState,useEffect,useRef,useCallback}=React;

/* ══════════════════════════════════════════════════════
   ADMIN SYSTEM — secret trigger: type "admin" anywhere
   Password: rellow2026  |  Persists to localStorage
══════════════════════════════════════════════════════ */
const ADMIN_PW='rellow2026';
const LS_KEY='rp_site_content';
function loadContent(def){try{const r=localStorage.getItem(LS_KEY);if(r)return{...def,...JSON.parse(r)};}catch(e){}return def;}
function saveContent(d){try{localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){}}
function showToast(){const t=document.getElementById('save-toast');if(!t)return;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function LoginModal({onSuccess,onClose}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);
  const attempt=()=>{if(pw===ADMIN_PW){setErr(false);onSuccess();}else{setErr(true);setPw('');}};
  return(
    <div className="admin-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="admin-modal">
        <button className="admin-modal-close" onClick={onClose}>✕</button>
        <div className="admin-modal-title">Admin access</div>
        <div className="admin-modal-sub">Enter password to edit</div>
        <input ref={ref} type="password" className={'admin-input'+(err?' admin-input-err':'')} placeholder="Password"
          value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==='Enter'&&attempt()}/>
        <div className="admin-err">{err?'Incorrect password':''}</div>
        <button className="btn btn-solid" style={{width:'100%',justifyContent:'center',marginTop:'4px'}} onClick={attempt}>Unlock →</button>
      </div>
    </div>

function useFI(delay=0){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    el.style.transitionDelay=delay+'s';
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('in');obs.disconnect();}},{threshold:.12});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  return ref;
}
function FI({children,delay=0,style={},className=''}){
  const ref=useFI(delay);
  return <div ref={ref} className={'fi '+className} style={style}>{children}</div>;
}
